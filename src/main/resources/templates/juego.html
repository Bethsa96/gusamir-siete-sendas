<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Gusamir y las Siete Sendas</title>
        <link rel="stylesheet" th:href="@{/css/juego.css}">
    </head>
    <body>

        <main id="pantalla-juego">

            <section id="pantalla-inicio" class="pantalla portada-juego">
                <div class="menu-portada">
                    <button class="boton-menu-pixel" onclick="nuevaPartida()">
                        <span>Nueva partida</span>
                    </button>

                    <button class="boton-menu-pixel" onclick="continuarPartida()">
                        <span>Continuar</span>
                    </button>

                    <button class="boton-menu-pixel" onclick="mostrarLogros()">
                        <span>Logros</span>
                    </button>
                </div>
            </section>

            <section id="zona-juego" class="pantalla oculto">
                <div class="barra-superior">
                    <span id="fecha-juego">Día 1 · Mañana</span>

                    <div class="botones-superiores">
                        <button onclick="abrirMenuJuego()">Aventura</button>
                        <button onclick="mostrarMenu()">Menú Principal</button>
                    </div>
                </div>

                <h2 id="titulo-escena"></h2>
                <p id="texto-escena"></p>

                <div id="opciones"></div>
            </section>

            <section id="menu-juego" class="pantalla oculto">
                <h2>Menú de Gusamir</h2>

                <button onclick="mostrarSubmenu('inventario')">🎒 Mochila</button>
                <button onclick="mostrarSubmenu('cartas')">✉️ Cartas</button>
                <button onclick="mostrarSubmenu('flores')">🌸 Flores</button>
                <button onclick="mostrarSubmenu('mapa')">📜 Mapa</button>
                <button id="boton-viajar" onclick="abrirMapaViaje()">🧭 Viajar</button>
                <button onclick="mostrarSubmenu('diario')">📖 Diario</button>
                <button onclick="mostrarSubmenu('estado')">📊 Estado</button>

                <hr>

                <div id="contenido-submenu"></div>

                <button onclick="cerrarMenuJuego()">Volver a la aventura</button>
            </section>

            <section id="zona-logros" class="pantalla oculto">
                <h2>Logros</h2>
                <div id="lista-logros"></div>
                <button onclick="volverAlMenu()">Volver</button>
            </section>

        </main>

        <script th:src="@{/js/estado-inicial.js}"></script>
        <script th:src="@{/js/logros.js}"></script>
        <script th:src="@{/js/escenas-acto1.js}"></script>
        <script th:src="@{/js/escenas-acto2.js}"></script>
        <script th:src="@{/js/escenas-acto3.js}"></script>
        <script th:src="@{/js/escenas-acto4.js}"></script>
        <script th:src="@{/js/escenas-acto5.js}"></script>
        <script th:src="@{/js/escenas-acto6.js}"></script>
        <script th:src="@{/js/viaje.js}"></script>
        <script th:src="@{/js/escenas-acto7.js}"></script>
        <script th:src="@{/js/escenas-acto8.js}"></script>
        <script th:src="@{/js/juego.js}"></script>

    </body>
</html>
